    .article-wrap {

      grid-template-columns: 380px 1fr;

    function getArticle(id) {
      const stored = localStorage.getItem('da_news');
      const all = stored ? JSON.parse(stored) : DEFAULT_NEWS;
      return all.find(a => String(a.id) === String(id)) || null;
    }

    function renderArticle() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) { showNotFound(); return; }

      const article = getArticle(id);
      if (!article) { showNotFound(); return; }

      document.title = article.title + ' — Dylan Akosah';
      document.getElementById('article-title').textContent = article.title;
      document.getElementById('article-date').textContent  = article.date || article.year || '';

      // Body — support line breaks
      const bodyEl = document.getElementById('article-body');
      const paras = (article.body || '').split('\n').filter(p => p.trim());
      bodyEl.innerHTML = paras.map(p => `<p>${p}</p>`).join('');

      // Image
      if (article.image) {
        const img = document.getElementById('article-img');
        img.src = article.image;
        img.style.display = 'block';
        document.getElementById('article-img-placeholder').style.display = 'none';
      }

      // External link
      if (article.link) {
        const wrap = document.getElementById('article-link-wrap');
        const link = document.getElementById('article-ext-link');
        link.href = article.link;
        link.textContent = article.linkText || article.link;
        wrap.style.display = 'block';
      }
    }

    function showNotFound() {
      document.getElementById('article-grid').style.display = 'none';
      document.getElementById('not-found').style.display = 'block';
    }

    window.addEventListener('load', () => {
      renderArticle();
      setTimeout(() => document.getElementById('article-wrap').classList.add('visible'), 100);
    });
  </script>
